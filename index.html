<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyma Cava & Freshness - Official v1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <div id="vista-login" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="bg-slate-900 border border-emerald-500/30 p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-4xl font-black text-center text-emerald-500 tracking-wider mb-1">CHUYMA</h1>
            <p class="text-slate-400 text-center text-xs uppercase tracking-widest mb-8">Cava & Trazabilidad de Producto Terminado</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Correo Electrónico</label>
                    <input type="email" id="login-email" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Contraseña</label>
                    <input type="password" id="login-password" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:border-emerald-500 transition">
                </div>
                <button id="btn-login" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black py-4 px-4 rounded-xl transition duration-200 mt-2 text-lg uppercase tracking-wide cursor-pointer">
                    Abrir Cava
                </button>
                <p id="login-error" class="text-red-400 text-sm text-center font-semibold mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <div id="vista-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40">
            <div class="max-w-6xl w-full mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black text-emerald-500 tracking-wide">CHUYMA CAVA</h1>
                    <p class="text-xs text-slate-400 font-medium">Control de Maduración y Frescura (Módulo 120 días)</p>
                </div>
                <div class="flex items-center gap-4">
                    <div id="alerta-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 text-slate-400 text-xs font-bold border border-slate-800"></div>
                    <button id="btn-logout" class="bg-red-950/40 hover:bg-red-900/40 border border-red-800 text-red-300 font-bold px-4 py-2 rounded-xl text-xs uppercase tracking-wider transition">
                        Salir
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 max-w-6xl w-full mx-auto space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="buscador" placeholder="🔍 Buscar por lote o estilo..." class="md:col-span-1 w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-white text-base focus:outline-none focus:border-emerald-500 shadow-inner">
                <button id="btn-abrir-camara" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black p-4 rounded-xl flex items-center justify-center gap-2 shadow-lg text-sm uppercase tracking-wider transition cursor-pointer">
                    📷 ESCANEAR QR EN CAVA
                </button>
                <button id="btn-nuevo-lote" class="bg-slate-900 hover:bg-slate-850 text-emerald-500 border border-emerald-500/20 font-bold p-4 rounded-xl flex items-center justify-center gap-2 shadow-lg text-sm uppercase tracking-wider transition cursor-pointer">
                    📦 REGISTRAR ENVASE DE LOTE
                </button>
            </div>

            <div id="contenedor-camara" class="hidden bg-black p-4 rounded-2xl border border-emerald-500 max-w-md mx-auto relative shadow-2xl">
                <div id="lector-qr" class="w-full overflow-hidden rounded-xl"></div>
                <button id="btn-cerrar-camara" class="w-full bg-red-600 hover:bg-red-700 text-white font-black p-3 rounded-xl mt-3 text-xs uppercase tracking-wider transition cursor-pointer">
                    Apagar Cámara
                </button>
            </div>

            <div class="flex gap-2 border-b border-slate-800 pb-2">
                <button onclick="filtrarPorEstado('todos')" id="tab-todos" class="tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-emerald-500 text-slate-950 shadow">Todos</button>
                <button onclick="filtrarPorEstado('fresco')" id="tab-fresco" class="tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-slate-900 text-slate-400">Frescura Óptima</button>
                <button onclick="filtrarPorEstado('critico')" id="tab-critico" class="tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-slate-900 text-slate-400">Madurez Límite (>120 días)</button>
            </div>

            <div id="lista-lotes" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

            <div id="form-lote" class="hidden bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-6 shadow-2xl relative max-w-4xl mx-auto">
                <h2 id="form-titulo" class="text-2xl font-black text-emerald-500 border-b border-slate-800 pb-3 uppercase">Detalle de Producto en Cava</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Estilo de Cerveza</label>
                                <select id="lote-estilo" onchange="verificarEstiloPersonalizado(this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white font-semibold focus:outline-none focus:border-emerald-500">
                                    <option value="Pale Ale">Pale Ale</option>
                                    <option value="Amber Ale">Amber Ale</option>
                                    <option value="PERSONALIZADO">✍️ OTRO (Digitar a mano...)</option>
                                </select>
                            </div>
                            <div id="contenedor-estilo-manual" class="hidden">
                                <label class="block text-xs font-bold uppercase text-amber-500 mb-1">Escribe el estilo manual</label>
                                <input type="text" id="lote-estilo-manual" placeholder="Ej: Pumpkin Sour Ale" class="w-full bg-slate-800 border border-amber-500 rounded-xl p-3 text-white focus:outline-none focus:border-amber-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Código de Lote</label>
                                <input type="text" id="lote-codigo" placeholder="Ej: LOTE-042" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white font-mono text-center focus:outline-none focus:border-emerald-500">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Fecha de Envasado</label>
                                <input type="date" id="lote-fecha" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white text-center focus:outline-none focus:border-emerald-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Cantidad de Cajas</label>
                                <input type="number" id="lote-cajas" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white font-bold text-center focus:outline-none focus:border-emerald-500">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Ubicación / Estante</label>
                                <input type="text" id="lote-ubicacion" placeholder="Ej: Rack A Sur" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500">
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex flex-col items-center justify-center text-center min-h-[220px]">
                        <span class="text-xs font-bold text-slate-500 uppercase mb-3">Identificador Único Cava</span>
                        <div id="qrcode-container" class="bg-white p-3 rounded-xl inline-block shadow-lg"></div>
                        <button id="btn-imprimir-qr" class="w-full bg-slate-800 hover:bg-slate-750 text-emerald-500 font-bold text-xs py-2.5 rounded-xl mt-4 border border-emerald-500/10 transition cursor-pointer">
                            🖨️ IMPRIMIR QR DE CAVA
                        </button>
                    </div>
                </div>

                <div class="flex gap-3 justify-end border-t border-slate-800 pt-4">
                    <button id="btn-cancelar" class="bg-slate-750 text-slate-400 font-bold px-5 py-3 rounded-xl hover:bg-slate-700 transition cursor-pointer">Cancelar</button>
                    <button id="btn-guardar" class="bg-emerald-500 text-slate-950 font-black px-8 py-3 rounded-xl hover:bg-emerald-600 transition uppercase text-sm cursor-pointer">Guardar Lote</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyBSaIzbcFiyTF1zy9_9Z97ZSPfL322xO24",
            authDomain: "inventariochuyma-da052.firebaseapp.com",
            projectId: "inventariochuyma-da052",
            storageBucket: "inventariochuyma-da052.firebasestorage.app",
            messagingSenderId: "677439195293",
            appId: "1:677439195293:web:50b624de9e0c877c89ec74"
        };

        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();
        var db = firebase.firestore();

        var lotesLocales = [];
        var qrScanner = null;
        var idLoteSeleccionado = null;
        var estadoFiltro = "todos";

        var vistaLogin = document.getElementById('vista-login');
        var vistaApp = document.getElementById('vista-app');
        var errorTxt = document.getElementById('login-error');
        var buscador = document.getElementById('buscador');
        var listaLotes = document.getElementById('lista-lotes');
        var formLote = document.getElementById('form-lote');
        var qrcodeContainer = document.getElementById('qrcode-container');

        // REPARADO INTERNAMENTE CON LOS ID EXACTOS DEL FORMULARIO DEL LOGIN
        document.getElementById('btn-login').addEventListener('click', function(e) {
            e.preventDefault();
            errorTxt.classList.add('hidden');
            
            var email = document.getElementById('login-email').value.trim();
            var pass = document.getElementById('login-password').value.trim();
            
            if(!email || !pass) return;
            
            auth.signInWithEmailAndPassword(email, pass)
                .then(function() {
                    console.log("Acceso exitoso detectado");
                })
                .catch(function(err) {
                    console.error("Fallo de acceso:", err);
                    errorTxt.textContent = "Clave o usuario incorrecto.";
                    errorTxt.classList.remove('hidden');
                });
        });

        document.getElementById('btn-logout').addEventListener('click', function() { auth.signOut(); });

        auth.onAuthStateChanged(function(user) {
            if (user) {
                vistaLogin.classList.add('hidden');
                vistaApp.classList.remove('hidden');
                
                db.collection("inventario").where("esProductoTerminado", "==", true).onSnapshot(function(snapshot) {
                    lotesLocales = [];
                    snapshot.forEach(function(doc) {
                        lotesLocales.push(Object.assign({ id: doc.id }, doc.data()));
                    });
                    calcularMetricasYRender();
                });
            } else {
                vistaLogin.classList.remove('hidden');
                vistaApp.classList.add('hidden');
            }
        });

        window.verificarEstiloPersonalizado = function(val) {
            var manualInput = document.getElementById('contenedor-estilo-manual');
            if(val === 'PERSONALIZADO') {
                manualInput.classList.remove('hidden');
            } else {
                manualInput.classList.add('hidden');
                document.getElementById('lote-estilo-manual').value = "";
            }
        };

        window.filtrarPorEstado = function(estado) {
            estadoFiltro = estado;
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.className = "tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-slate-900 text-slate-400";
            });
            document.getElementById('tab-' + estado).className = "tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-emerald-500 text-slate-950 shadow";
            ejecutarFiltro();
        };

        function ejecutarFiltro() {
            var txt = buscador.value.toLowerCase();
            var hoy = new Date();

            var filtrados = lotesLocales.filter(function(l) {
                var fechaEnvasado = new Date(l.fecha + "T00:00:00");
                var diffTiempo = hoy.getTime() - fechaEnvasado.getTime();
                var diasTranscurridos = Math.floor(diffTiempo / (1000 * 3600 * 24));
                var esCritico = diasTranscurridos > 120;

                var matchesEstado = true;
                if(estadoFiltro === 'fresco') matchesEstado = !esCritico;
                if(estadoFiltro === 'critico') matchesEstado = esCritico;

                var matchesTxt = l.estilo.toLowerCase().includes(txt) || l.codigo.toLowerCase().includes(txt);
                return matchesEstado && matchesTxt;
            });

            renderLista(filtrados);
        }

        buscador.addEventListener('input', ejecutarFiltro);

        function calcularMetricasYRender() {
            var hoy = new Date();
            var lotesCriticos = 0;

            lotesLocales.forEach(function(l) {
                var fechaEnvasado = new Date(l.fecha + "T00:00:00");
                var diffTiempo = hoy.getTime() - fechaEnvasado.getTime();
                var diasTranscurridos = Math.floor(diffTiempo / (1000 * 3600 * 24));
                if(diasTranscurridos > 120) lotesCriticos++;
            });

            var statusDiv = document.getElementById('alerta-status');
            if(lotesCriticos > 0) {
                statusDiv.innerHTML = `<span class="w-2 h-2 bg-rose-500 rounded-full inline-block animate-ping"></span> ${lotesCriticos} LOTES CRÍTICOS (>120 DÍAS)`;
                statusDiv.className = "flex items-center gap-2 px-3 py-1.5 rounded-full bg-rose-950/40 text-rose-400 text-xs font-black border border-rose-900/40";
            } else {
                statusDiv.innerHTML = `<span class="w-2 h-2 bg-emerald-400 rounded-full inline-block"></span> TODO FRESCO EN CAVA`;
                statusDiv.className = "flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 text-emerald-400 text-xs font-bold border border-slate-800";
            }
            ejecutarFiltro();
        }

        function renderLista(datos) {
            listaLotes.innerHTML = "";
            if(datos.length === 0) {
                listaLotes.innerHTML = `<div class="col-span-full text-center py-12 text-slate-600 font-medium text-sm">No hay registros de producto terminado aún.</div>`;
                return;
            }

            var hoy = new Date();

            datos.forEach(function(item) {
                var fechaEnvasado = new Date(item.fecha + "T00:00:00");
                var diffTiempo = hoy.getTime() - fechaEnvasado.getTime();
                var diasTranscurridos = Math.floor(diffTiempo / (1000 * 3600 * 24));
                var esCritico = diasTranscurridos > 120;

                var card = document.createElement('div');
                card.className = `bg-slate-900 p-5 rounded-2xl border flex flex-col justify-between h-48 shadow-lg transition ${esCritico ? 'border-rose-500/50 shadow-rose-950/10' : 'border-slate-850 hover:border-slate-800'}`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-black text-white text-lg truncate w-full tracking-wide">${item.estilo}</h3>
                            <span class="text-[10px] font-mono font-extrabold uppercase px-2 py-0.5 rounded bg-slate-950 text-emerald-400">${item.codigo}</span>
                        </div>
                        <p class="text-xs font-bold text-slate-500 mt-1">Envasado: <span class="text-slate-300">${item.fecha}</span></p>
                    </div>
                    <div class="flex items-center justify-between border-t border-slate-850 pt-3">
                        <div>
                            <span class="text-[10px] uppercase text-slate-500 font-bold block">Edad en Cava</span>
                            <span class="font-black text-base ${esCritico ? 'text-rose-400' : 'text-emerald-400'}">${diasTranscurridos} días</span>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] uppercase text-slate-500 font-bold block">Cantidad</span>
                            <span class="font-black text-white text-base block">${item.cajas} cajas</span>
                        </div>
                        <button onclick="verFichaCava('${item.id}')" class="bg-emerald-500 text-slate-950 font-black px-4 py-2.5 rounded-xl text-xs uppercase cursor-pointer">Detalle</button>
                    </div>
                `;
                listaLotes.appendChild(card);
            });
        }

        window.verFichaCava = function(id) {
            idLoteSeleccionado = id;
            var item = lotesLocales.find(function(l) { return l.id === id; });
            
            document.getElementById('form-titulo').textContent = "Modificar Lote en Cava";
            document.getElementById('lote-codigo').value = item.codigo;
            document.getElementById('lote-fecha').value = item.fecha;
            document.getElementById('lote-cajas').value = item.cajas;
            document.getElementById('lote-ubicacion').value = item.ubicacion || "";

            var selectEstilo = document.getElementById('lote-estilo');
            if(item.estilo === 'Pale Ale' || item.estilo === 'Amber Ale') {
                selectEstilo.value = item.estilo;
                verificarEstiloPersonalizado(item.estilo);
            } else {
                selectEstilo.value = 'PERSONALIZADO';
                verificarEstiloPersonalizado('PERSONALIZADO');
                document.getElementById('lote-estilo-manual').value = item.estilo;
            }

            qrcodeContainer.innerHTML = "";
            new QRCode(qrcodeContainer, { text: id, width: 120, height: 120 });
            formLote.classList.remove('hidden');
            formLote.scrollIntoView({ behavior: 'smooth' });
        };

        document.getElementById('btn-nuevo-lote').addEventListener('click', function() {
            idLoteSeleccionado = null;
            document.getElementById('form-titulo').textContent = "Registrar Salida de Embotellado";
            document.getElementById('lote-codigo').value = "";
            document.getElementById('lote-fecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('lote-cajas').value = "";
            document.getElementById('lote-ubicacion').value = "";
            document.getElementById('lote-estilo').value = "Pale Ale";
            verificarEstiloPersonalizado("Pale Ale");
            qrcodeContainer.innerHTML = "<p class='text-[10px] text-slate-600 p-4 font-bold uppercase'>Se creará al guardar</p>";
            formLote.classList.remove('hidden');
            formLote.scrollIntoView({ behavior: 'smooth' });
        });

        document.getElementById('btn-cancelar').addEventListener('click', function() { formLote.classList.add('hidden'); });

        document.getElementById('btn-guardar').addEventListener('click', function() {
            var estiloSelect = document.getElementById('lote-estilo').value;
            var estiloFinal = estiloSelect;

            if(estiloSelect === 'PERSONALIZADO') {
                estiloFinal = document.getElementById('lote-estilo-manual').value.trim();
            }

            var payload = {
                estilo: estiloFinal,
                codigo: document.getElementById('lote-codigo').value.trim().toUpperCase(),
                fecha: document.getElementById('lote-fecha').value,
                cajas: Number(document.getElementById('lote-cajas').value),
                ubicacion: document.getElementById('lote-ubicacion').value.trim(),
                esProductoTerminado: true 
            };

            if(!payload.estilo || !payload.codigo || !payload.fecha) {
                alert("Por favor completa los datos obligatorios.");
                return;
            }

            if(idLoteSeleccionado) {
                db.collection("inventario").doc(idLoteSeleccionado).update(payload);
            } else {
                db.collection("inventario").add(payload);
            }

            formLote.classList.add('hidden');
        });

        document.getElementById('btn-imprimir-qr').addEventListener('click', function() {
            var estiloSelect = document.getElementById('lote-estilo').value;
            var estilo = estiloSelect === 'PERSONALIZADO' ? document.getElementById('lote-estilo-manual').value : estiloSelect;
            var codigo = document.getElementById('lote-codigo').value || "S/L";
            var win = window.open('', '_blank', 'width=400,height=400');
            win.document.write('<html><body style="text-align:center;font-family:sans-serif;padding:20px;"><h2>CHUYMA CAVA</h2><p><b>'+estilo+'</b></p><p>Lote: '+codigo+'</p><div>'+qrcodeContainer.innerHTML+'</div><script>window.onload=function(){window.print();window.close();}<\/script></body></html>');
            win.document.close();
        });

        document.getElementById('btn-abrir-camara').addEventListener('click', function() {
            document.getElementById('contenedor-camara').classList.remove('hidden');
            qrScanner = new Html5Qrcode("lector-qr");
            qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 220 },
                function(idScaneado) {
                    qrScanner.stop().then(function() {
                        document.getElementById('contenedor-camara').classList.add('hidden');
                        verFichaCava(idScaneado);
                    });
                }, function() {}
            ).catch(function() { document.getElementById('contenedor-camara').classList.add('hidden'); });
        });

        document.getElementById('btn-cerrar-camara').addEventListener('click', function() {
            if(qrScanner) qrScanner.stop().then(function() { document.getElementById('contenedor-camara').classList.add('hidden'); });
            else document.getElementById('contenedor-camara').classList.add('hidden');
        });
    </script>
</body>
</html>
