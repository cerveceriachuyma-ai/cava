<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyma Cava & Freshness - Official v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <div id="vista-login" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="bg-slate-900 border border-emerald-500/30 p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-4xl font-black text-center text-emerald-500 tracking-wider mb-1">CHUYMA</h1>
            <p class="text-slate-400 text-center text-xs uppercase tracking-widest mb-8">Cava & Trazabilidad de Producto Terminado</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Correo Electrónico</label>
                    <input type="email" id="login-email" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:border-emerald-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Contraseña</label>
                    <input type="password" id="login-password" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3.5 text-white focus:outline-none focus:border-emerald-500 transition">
                </div>
                <button id="btn-login" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black py-4 px-4 rounded-xl transition duration-200 mt-2 text-lg uppercase tracking-wide cursor-pointer">
                    Abrir Cava
                </button>
                <p id="login-error" class="text-red-400 text-sm text-center font-semibold mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <div id="vista-app" class="hidden min-h-screen flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40">
            <div class="max-w-6xl w-full mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black text-emerald-500 tracking-wide">CHUYMA CAVA</h1>
                    <p class="text-xs text-slate-400 font-medium">Control de Maduración y Frescura (Módulo 120 días)</p>
                </div>
                <div class="flex items-center gap-4">
                    <div id="alerta-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 text-slate-400 text-xs font-bold border border-slate-800"></div>
                    <button id="btn-logout" class="bg-red-950/40 hover:bg-red-900/40 border border-red-800 text-red-300 font-bold px-4 py-2 rounded-xl text-xs uppercase tracking-wider transition">
                        Salir
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 max-w-6xl w-full mx-auto space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="buscador" placeholder="🔍 Buscar por lote o estilo..." class="md:col-span-1 w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-white text-base focus:outline-none focus:border-emerald-500 shadow-inner">
                <button id="btn-abrir-camara" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black p-4 rounded-xl flex items-center justify-center gap-2 shadow-lg text-sm uppercase tracking-wider transition cursor-pointer">
                    📷 ESCANEAR QR EN CAVA
                </button>
                <button id="btn-nuevo-lote" class="bg-slate-900 hover:bg-slate-850 text-emerald-500 border border-emerald-500/20 font-bold p-4 rounded-xl flex items-center justify-center gap-2 shadow-lg text-sm uppercase tracking-wider transition cursor-pointer">
                    📦 REGISTRAR ENVASE DE LOTE
                </button>
            </div>

            <div id="contenedor-camara" class="hidden bg-black p-4 rounded-2xl border border-emerald-500 max-w-md mx-auto relative shadow-2xl">
                <div id="lector-qr" class="w-full overflow-hidden rounded-xl"></div>
                <button id="btn-cerrar-camara" class="w-full bg-red-600 hover:bg-red-700 text-white font-black p-3 rounded-xl mt-3 text-xs uppercase tracking-wider transition cursor-pointer">
                    Apagar Cámara
                </button>
            </div>

            <div class="flex gap-2 border-b border-slate-800 pb-2">
                <button onclick="filtrarPorEstado('todos')" id="tab-todos" class="tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-emerald-500 text-slate-950 shadow">Todos</button>
                <button onclick="filtrarPorEstado('fresco')" id="tab-fresco" class="tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-slate-900 text-slate-400">Frescura Óptima</button>
                <button onclick="filtrarPorEstado('critico')" id="tab-critico" class="tab-btn px-4 py-2 rounded-xl font-bold text-xs uppercase bg-slate-900 text-slate-400">Madurez Límite (>120 días)</button>
            </div>

            <div id="lista-lotes" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

            <div id="form-lote" class="hidden bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-6 shadow-2xl relative max-w-4xl mx-auto">
                <h2 id="form-titulo" class="text-2xl font-black text-emerald-500 border-b border-slate-800 pb-3 uppercase">Detalle de Producto en Cava</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 space-y-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Estilo de Cerveza</label>
                                <select id="lote-estilo" onchange="verificarEstiloPersonalizado(this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white font-semibold focus:outline-none focus:border-emerald-500">
                                    <option value="Pale Ale">Pale Ale</option>
                                    <option value="Amber Ale">Amber Ale</option>
                                    <option value="PERSONALIZADO">✍️ OTRO (Digitar a mano...)</option>
                                </select>
                            </div>
                            <div id="contenedor-estilo-manual" class="hidden">
                                <label class="block text-xs font-bold uppercase text-amber-500 mb-1">Escribe el estilo manual</label>
                                <input type="text" id="lote-estilo-manual" placeholder="Ej: Pumpkin Sour Ale" class="w-full bg-slate-800 border border-amber-500 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Código de Lote</label>
                                <input type="text" id="lote-codigo" placeholder="Ej: LOTE-042" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white font-mono text-center focus:outline-none focus:border-emerald-500">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Fecha de Envasado</label>
                                <input type="date" id="lote-fecha" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white text-center focus:outline-none focus:border-emerald-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Cantidad de Cajas</label>
                                <input type="number" id="lote-cajas" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white font-bold text-center focus:outline-none focus:border-emerald-500">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Ubicación / Estante</label>
                                <input type="text" id="lote-ubicacion" placeholder="Ej: Rack A Sur" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500">
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex flex-col items-center justify-center text-center min-h-[220px]">
                        <span class="text-xs font-bold text-slate-500 uppercase mb-3">Identificador Único Cava</span>
                        <div id="qrcode-container" class="bg-white p-3 rounded-xl inline-block shadow-lg"></div>
                        <button id="btn-imprimir-qr" class="w-full bg-slate-800 hover:bg-slate-750 text-emerald-500 font-bold text-xs py-2.5 rounded-xl mt-4 border border-emerald-500/10 transition cursor-pointer">
                            🖨️ IMPRIMIR QR DE CAVA
                        </button>
                    </div>
                </div>

                <div class="flex gap-3 justify-end border-t border-slate-800 pt-4">
                    <button id="btn-cancelar" class="bg-slate-750 text-slate-400 font-bold px-5 py-3 rounded-xl hover:bg-slate-700 transition cursor-pointer">Cancelar</button>
                    <button id="btn-guardar" class="bg-emerald-500 text-slate-950 font-black px-8 py-3 rounded-xl hover:bg-emerald-600 transition uppercase text-sm cursor-pointer">Guardar Lote</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyBSaIzbcFiyTF1zy9_9Z97ZSPfL322xO24",
            authDomain: "inventariochuyma-da052.firebaseapp.com",
            projectId: "inventariochuyma-da052",
            storageBucket: "inventariochuyma-da052.firebasestorage.app",
            messagingSenderId: "677439195293",
            appId: "1:677439195293:web:50b624de9e0c877c89ec74"
        };

        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();
        var db = firebase.firestore();

        var lotesLocales = [];
        var qrScanner = null;
        var idLoteSeleccionado = null;
        var estadoFiltro = "todos";

        var vistaLogin = document.getElementById('vista-login');
        var vistaApp = document.getElementById('vista-
